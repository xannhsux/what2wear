name: What2Wear
options:
  bundleIdPrefix: com.what2wear
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  What2Wear:
    type: application
    platform: iOS
    sources:
      - What2Wear
    settings:
      base:
        INFOPLIST_FILE: What2Wear/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.what2wear.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: What2Wear/Info.plist
      properties:
        CFBundleName: What2Wear
        CFBundleDisplayName: What2Wear
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSCameraUsageDescription: "What2Wear needs camera access to take selfies for avatar creation"
        NSPhotoLibraryUsageDescription: "What2Wear needs photo library access to select photos for avatar creation"
        UIUserInterfaceStyle: Light
